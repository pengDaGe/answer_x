<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AnswerX - Splash Screen</title>

                    "primary-container": "#d779ff",
                    "on-primary-container": "#3d0056",
                    "primary-dim": "#b90afc",

                    "on-tertiary-fixed": "#453900",

<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Splash Screen Container -->
<main class="relative w-full h-screen flex flex-col items-center justify-center bg-surface">
<!-- Ambient Background Glows -->
<div class="absolute inset-0 z-0 flex items-center justify-center pointer-events-none">
<!-- Center strong glow -->
<div class="absolute w-[80vw] h-[80vw] max-w-[800px] max-h-[800px] bg-primary-dim/20 rounded-full blur-[120px]"></div>
<!-- Outer subtle aura -->
<div class="absolute w-[120vw] h-[120vw] max-w-[1200px] max-h-[1200px] bg-secondary-container/10 rounded-full blur-[150px]"></div>
</div>
<!-- Geometric/Circuit Overlay (Subtle) -->
<div class="absolute inset-0 z-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(circle at center, #ffffff 1px, transparent 1px); background-size: 40px 40px;">
</div>
<!-- Vertical "Energy" Line -->
<div class="absolute inset-y-0 left-1/2 -translate-x-1/2 w-[1px] bg-gradient-to-b from-transparent via-primary/20 to-transparent z-0"></div>
<!-- Content Payload -->
<div class="relative z-10 flex flex-col items-center text-center px-6">
<!-- App Icon Area -->
<div class="relative mb-14">
<!-- Icon Outer Halo (Glassmorphism portal effect) -->
<div class="absolute -inset-8 bg-surface-variant/30 rounded-[3rem] backdrop-blur-xl border border-outline-variant/10 shadow-[0_0_80px_rgba(222,142,255,0.15)] flex items-center justify-center"></div>
<!-- Inner glow ring -->
<div class="absolute -inset-1 bg-gradient-to-br from-primary to-primary-dim rounded-2xl opacity-40 blur-md"></div>
<!-- The App Icon -->
<img alt="AnswerX Brand Icon" class="relative w-32 h-32 md:w-48 md:h-48 object-cover rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.8)] border border-surface-container-highest" data-alt="Sharp dark square app icon featuring 8 mystical cyberpunk theme symbols glowing with neon fuchsia energy against an obsidian background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7L9Fq-0gQ1ajP0vMucw5cMSy4sgSOm7y42JVdFnUK1c51GJ8mOjUAYZTU6QskKRv0kg4gshBLwPYraUTPSkHwdCr7IU_BYsIEhWVNgec2jqUZ5elhUzMbpEj9yARF9_fyj3WJZ4qes_xDTwmlAFqpssuZWva-4ZQnJop3keDnEy-GOR9gbr5BfX3qmVXlfXOWpmCt6jTSWU89OX3939hOOeBPcstmipSSNcS2JLthXv3IzuBumKhO3EqQ3fFv7A9j1oEtZZ4u4VQ"/>
</div>
<!-- Typography -->
<div class="flex flex-col items-center">
<!-- Main Brand Headline -->
<h1 class="font-headline text-5xl md:text-7xl font-black tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-b from-white via-primary-fixed to-primary-dim drop-shadow-[0_0_15px_rgba(222,142,255,0.4)]">
                    AnswerX
                </h1>
<!-- Subtitle / Motto -->
<p class="font-body text-sm md:text-base text-on-surface-variant/80 tracking-[0.4em] uppercase">
                    Connect to the Void
                </p>
<!-- Secondary Subtitle (Optional contextual grounding) -->
</div>
</div>
<!-- Bottom Anchor (Decorative loading metric concept) -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-2 opacity-40">
<div class="h-[2px] w-12 bg-outline-variant/30 rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary rounded-full"></div>
</div>
<span class="font-label text-[10px] text-on-surface-variant tracking-widest uppercase">Initializing Ritual</span>
</div>
</main>
</body></html>
